<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャット</title>
    
    <!-- Content Security Policy (CSP) : Google翻訳API以外の怪しい通信を完全ブロック -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://translate.googleapis.com;
        font-src 'self';
        img-src 'self' data:;
        base-uri 'self';
        form-action 'self';
    ">
    
    <style>
        /* Appleダークモードのカラーパレット */
        :root {
            --bg-color: #000000;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --msg-received-bg: #2c2c2e;
            --msg-received-text: #ffffff;
            --msg-sent-bg: #1c1c1e;
            --msg-sent-text: #a0a0a5;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 16px;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .version-date {
            font-size: 12px;
            color: #a0a0a5;
            font-weight: normal;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px 15px 120px 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            cursor: default;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .translation-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
        }

        .message {
            width: 100%;
            padding: 10px 15px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 16px;
            cursor: text;
        }

        .sent {
            background-color: var(--msg-sent-bg);
            color: var(--msg-sent-text);
            border-radius: 12px 12px 4px 4px;
            font-size: 14px;
        }

        .received {
            background-color: var(--msg-received-bg);
            color: var(--msg-received-text);
            border-radius: 4px 4px 12px 12px;
            font-weight: 500;
        }

        .loading {
            opacity: 0.6;
            font-size: 14px;
            color: #ff9f0a;
        }

        #input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: default;
        }

        #paste-btn {
            background-color: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .manual-input {
            display: flex;
            gap: 10px;
        }
        .manual-input input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 16px;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .manual-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .manual-input button {
            background-color: #30d158;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manual-input button:active {
            opacity: 0.7;
        }
    </style>
</head>

    </div>

            <button id="send-btn">↑</button>
        </div>
    </div>

    function appendMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.textContent = text;
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
        return msgDiv;
    }

    function appendTranslationGroup(originalText) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'translation-group';

        const sentDiv = document.createElement('div');
        sentDiv.className = 'message sent';
        sentDiv.textContent = originalText;
        groupDiv.appendChild(sentDiv);

        const receivedDiv = document.createElement('div');
        receivedDiv.className = 'message received loading';
        receivedDiv.textContent = '翻訳中...';
        groupDiv.appendChild(receivedDiv);

        messagesContainer.appendChild(groupDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });

        return receivedDiv;
    }

    async function fetchGoogleTranslation(text) {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(text)}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('通信エラー');
            const data = await response.json();
            
            let translatedText = '';
            if (data && data[0]) {
                data[0].forEach(item => {
                    if (item[0]) translatedText += item[0];
                });
            }
            return translatedText.trim();
        } catch (error) {
            console.error(error);
            return 'エラー: 翻訳サーバーに接続できませんでした。';
        }
    }

    async function processTranslation(text) {
        if (!text) return;

        // ★ 日本語のみ（＋例外アルファベット）の判定
        const allowedEnglishWords =['sky', 'ok', 'gg', 'ty', 'thx', 'np', 'brb'];
        let checkText = text.toLowerCase();
        
        for (const word of allowedEnglishWords) {
            checkText = checkText.split(word).join('');
        }
        checkText = checkText.replace(/w+/g, '');
        
        if (!/[a-z]/.test(checkText)) {
            if (text === lastTranslatedText) return;
            lastTranslatedText = text;
            const resultDiv = appendTranslationGroup(escapeHTML(text));
            resultDiv.textContent = text;
            resultDiv.classList.remove('loading');
            resultDiv.style.color = 'var(--msg-received-text)';
            return;
        }

        // --- セキュリティ・連投制限 ---
        const now = Date.now();

        if (now < cooldownUntil) {
            if (!isCooldownNotified) {
                const remainingSec = Math.ceil((cooldownUntil - now) / 1000);
                appendMessage(`⚠️ スパム防止のため一時的に翻訳を制限しています。\nあと ${remainingSec} 秒お待ちください。`, 'received loading');
                isCooldownNotified = true;
            }
            return;
        }

        if (now - lastRequestTime < 1500) return;
        lastRequestTime = now;

        const elapsed = now - lastTokenUpdateTime;
        const restoreAmount = Math.floor(elapsed / 10000);
        if (restoreAmount > 0) {
            tokens = Math.min(MAX_TOKENS, tokens + restoreAmount);
            lastTokenUpdateTime = now - (elapsed % 10000);
        }

        if (tokens > 0) {
            tokens--;
            isCooldownNotified = false;
        } else {
            cooldownUntil = now + 180000;
            appendMessage(`🚫 【警告】異常な連続リクエストを検知しました。\nGoogleサーバー保護のため、3分間翻訳を停止します。`, 'received loading');
            isCooldownNotified = true;
            return;
        }

        const safeText = escapeHTML(text);

        if (safeText === lastTranslatedText) return;
        lastTranslatedText = safeText;
        
        const resultDiv = appendTranslationGroup(safeText);
        
        // --- 1. 事前置換（ダミーネーム方式） ---
        let processedText = safeText;
        // 復元用に「Googleが訳したダミー日本語」をキー、「最終的な意味」を値にして保存する
        let restoreDictionary = {};

        const sortedSlangs = Object.keys(slangDictionary).sort((a, b) => b.length - a.length);

        for (const slang of sortedSlangs) {
            const regex = new RegExp(`\\b${slang}\\b`, 'gi');
            if (regex.test(processedText)) {
                // ダミーの英単語に置き換える
                const dummyWord = slangDictionary[slang][0];
                const dummyJapanese = slangDictionary[slang][1];
                const finalMeaning = slangDictionary[slang][2];
                
                processedText = processedText.replace(regex, dummyWord);
                restoreDictionary[dummyJapanese] = finalMeaning;
            }
        }

        // --- 2. Google翻訳 ---
        let finalTranslation = await fetchGoogleTranslation(processedText);

        // --- 3. 事前置換の復元（ダミーの日本語を、本来のゲーム用語に直す） ---
        for (const[dummyJp, finalMeaning] of Object.entries(restoreDictionary)) {
            // Googleが出力した日本語（アリスなど）を検索して置換する
            const jpRegex = new RegExp(dummyJp, 'g');
            finalTranslation = finalTranslation.replace(jpRegex, finalMeaning);
            
            // 万が一Googleがダミー単語を翻訳から消してしまった場合の保険
            if (!finalTranslation.includes(finalMeaning)) {
                finalTranslation += `\n(※${finalMeaning})`;
            }
        }

        // --- 4. 事後置換（動詞や誤訳の修正） ---
        const sortedPostKeys = Object.keys(postTranslationDictionary).sort((a, b) => b.length - a.length);
        for (const key of sortedPostKeys) {
            const regex = new RegExp(key, 'gi');
            if (regex.test(finalTranslation)) {
                finalTranslation = finalTranslation.replace(regex, postTranslationDictionary[key]);
            }
        }

        // 成功時の表示
        resultDiv.textContent = finalTranslation;
        resultDiv.classList.remove('loading');
        resultDiv.style.color = 'var(--msg-received-text)';
    }

    async function readClipboardAndTranslate() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.trim() !== '') {
                let trimmedText = text.trim();
                
                if (trimmedText.length > 100) {
                    if (trimmedText !== lastErrorText) {
                        lastErrorText = trimmedText;
                        alert('文字数が100文字を超えているため翻訳できません。\n(現在の文字数: ' + trimmedText.length + '文字)');
                    }
                    return;
                }
                
                lastErrorText = "";
                processTranslation(trimmedText);
            }
        } catch (err) {
            console.log("クリップボードの読み取りがブロックされました", err);
        }
    }

    document.addEventListener('mousedown', (e) => {
        if (e.target.tagName.toLowerCase() !== 'input') {
            readClipboardAndTranslate();
        }
    });

    window.addEventListener('focus', () => {
        setTimeout(readClipboardAndTranslate, 100);
    });

    sendBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (text) {
            processTranslation(text);
            inputText.value = '';
        }
    });
    
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    inputText.addEventListener('paste', (e) => {
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        
        if (pasteData.length > 100) {
            e.preventDefault();
            alert('文字数が100文字を超えているため翻訳できません。\n(現在の文字数: ' + pasteData.length + '文字)');
            return;
        }

        setTimeout(() => {
            let text = inputText.value.trim();
            if (text) {
                processTranslation(text);
                inputText.value = '';
            }
        }, 50);
    });
</script>
