<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャット</title>
    <style>
        /* Appleダークモードのカラーパレット */
        :root {
            --bg-color: #000000;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --msg-received-bg: #2c2c2e;
            --msg-received-text: #ffffff;
            --msg-sent-bg: #0a84ff;
            --msg-sent-text: #ffffff;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ヘッダー */
        #header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 22px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ★ バージョン（日付）表示用のスタイル ★ */
        .version-date {
            font-size: 14px;
            color: #a0a0a5;
            font-weight: normal;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 80px 20px 160px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 22px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .sent {
            align-self: flex-end;
            background-color: var(--msg-sent-bg);
            color: var(--msg-sent-text);
            border-bottom-right-radius: 4px;
        }

        .received {
            align-self: flex-start;
            background-color: var(--msg-received-bg);
            color: var(--msg-received-text);
            border-bottom-left-radius: 4px;
        }

        .loading {
            opacity: 0.6;
            font-size: 18px;
        }

        #input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            padding: 15px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #paste-btn {
            background-color: var(--msg-sent-bg);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: opacity 0.2s;
        }
        #paste-btn:active {
            opacity: 0.7;
        }

        .manual-input {
            display: flex;
            gap: 12px;
        }
        .manual-input input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 18px;
            outline: none;
        }
        .manual-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .manual-input button {
            background-color: #30d158;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manual-input button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <!-- ★ ここに日付を追加しました ★ -->
    <div id="header">
        翻訳 <span class="version-date">v2026.04.21_01</span>
    </div>
    
    <div id="messages">
        <div class="message received">下の青いボタンを押すと自動で翻訳します。</div>
    </div>

        <button id="paste-btn">📋 コピーした文字を翻訳</button>
        <div class="manual-input">
            <input type="text" id="input-text" placeholder="ここにペースト(Ctrl+V)してもOK...">
            <button id="send-btn">↑</button>
        </div>
    </div>
</div>

        msgDiv.textContent = text;
        messagesContainer.appendChild(msgDiv);

        let processedText = text;
        
        // 辞書の一括高速置換（何万件あっても一瞬で終わる書き方）
        const slangRegex = new RegExp(`\\b(${Object.keys(slangDictionary).join('|')})\\b`, 'gi');
        processedText = processedText.replace(slangRegex, (match) => {
            return ` ${slangDictionary[match.toLowerCase()]} `;
        });

        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(processedText)}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('通信エラー');
            const data = await response.json();
            
            let translatedText = '';
            if (data && data[0]) {
                data[0].forEach(item => {
                    if (item[0]) translatedText += item[0];
                });
            }
            return translatedText.trim();
        } catch (error) {
            console.error(error);
            return 'エラー: 翻訳できませんでした。インターネット接続を確認してください。';
        }
    }

    async function processTranslation(text) {
        if (!text) return;
        appendMessage(text, 'sent');
        const loadingMsg = appendMessage('翻訳中...', 'received loading');
        const translatedText = await translateText(text);
        messagesContainer.removeChild(loadingMsg);
        appendMessage(translatedText, 'received');
    }

    // ★ ボタンクリックでの翻訳 ★
    pasteBtn.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            if (!text || text.trim() === '') {
                alert('クリップボードが空です。テキストをコピーしてから押してください。');
                return;
            }
            processTranslation(text.trim());
        } catch (err) {
            alert('ブラウザのセキュリティ制限で読み取れませんでした。下の入力欄にペースト(Ctrl+V)してください。');
        }
    });

    // ★ 手動入力・エンターキーでの翻訳 ★
    sendBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (text) {
            processTranslation(text);
            inputText.value = '';
        }
    });
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    // ★ 【追加機能】入力欄にペースト(Ctrl+V)した瞬間、自動で翻訳する ★
    inputText.addEventListener('paste', () => {
        setTimeout(() => {
            const text = inputText.value.trim();
            if (text) {
                processTranslation(text);
                inputText.value = ''; // 翻訳が始まったら入力欄を空にする
            }
        }, 50);
    });

</script>

</body>
</html>
