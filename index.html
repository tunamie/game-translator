<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャット</title>
    <style>
        /* Appleダークモードのカラーパレット */
        :root {
            --bg-color: #000000;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --msg-received-bg: #2c2c2e;
            --msg-received-text: #ffffff;
            --msg-sent-bg: #1c1c1e;
            --msg-sent-text: #a0a0a5;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 16px;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .version-date {
            font-size: 12px;
            color: #a0a0a5;
            font-weight: normal;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px 15px 120px 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            cursor: default;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .translation-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
        }

        .message {
            width: 100%;
            padding: 10px 15px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 16px;
            cursor: text;
        }

        .sent {
            background-color: var(--msg-sent-bg);
            color: var(--msg-sent-text);
            border-radius: 12px 12px 4px 4px;
            font-size: 14px;
        }

        .received {
            background-color: var(--msg-received-bg);
            color: var(--msg-received-text);
            border-radius: 4px 4px 12px 12px;
            font-weight: 500;
        }

        .loading {
            opacity: 0.6;
            font-size: 14px;
        }

        #input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: default;
        }

        #paste-btn {
            background-color: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .manual-input {
            display: flex;
            gap: 10px;
        }
        .manual-input input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 16px;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .manual-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .manual-input button {
            background-color: #30d158;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manual-input button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        翻訳 <span class="version-date">v2026.04.25</span>
    </div>
    
    <div id="messages">
        <div class="translation-group">
            <div class="message sent">ここにコピーした文章が表示されます</div>
            <div class="message received">画面のどこかをクリックするだけで自動翻訳</div>
        </div>
    </div>
    
    <div id="input-area">
        <button id="paste-btn">📋 コピーした文字を翻訳</button>
        <div class="manual-input">
            <!-- 文字数制限 maxlength="100" を追加 -->
            <input type="text" id="input-text" placeholder="ここにペースト(Ctrl+V)してもOK..." maxlength="100">
            <button id="send-btn">↑</button>
        </div>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const inputText = document.getElementById('input-text');
    const sendBtn = document.getElementById('send-btn');

    let lastTranslatedText = "";
    let lastRequestTime = 0; // 連続投稿制御用のタイマー変数

    // ★ XSS対策（入力されたHTMLタグを無害な文字に変換する関数）
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, function(match) {
            const escape = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            };
            return escape[match];
        });
    }

    // ★ Sky 星を紡ぐ子どもたち 専用辞書 ★
    const slangDictionary = {
        "skykid": "星の子", "skid": "星の子", "moth": "雀(初心者)", "moths": "雀たち", "butterfly": "蝶(中級者)", "vet": "ベテラン", "veteran": "ベテラン", "ikemen": "イケメン", "ikejou": "イケジョ", "chibi": "リトル", "capeless": "羽なし",
        "isle of dawn": "孤島", "isle": "孤島", "daylight prairie": "草原", "prairie": "草原", "hidden forest": "雨林", "forest": "雨林", "valley of triumph": "峡谷", "valley": "峡谷", "golden wasteland": "捨て地", "wasteland": "捨て地", "gw": "捨て地", "vault of knowledge": "書庫", "vault": "書庫", "eye of eden": "原罪", "eden": "原罪", "home": "ホーム", "aviary village": "花鳥郷", "aviary": "花鳥郷", "office": "オフィス", "orbit": "天空", "sanctuary islands": "楽園", "sanctuary": "楽園の島々", "cave of prophecies": "予言の石窟", "prophecy": "予言の石窟", "trials": "試練", "water trial": "水の試練", "earth trial": "地の試練", "air trial": "風の試練", "fire trial": "火の試練", "treehouse": "大樹の巣", "starlight desert": "星月夜の砂漠", "village of dreams": "夢見の町",
        "traveling spirit": "再訪する精霊", "ts": "再訪精霊", "spirits": "精霊", "spirit": "精霊", "elders": "大精霊", "elder": "大精霊", "dark dragon": "暗黒竜", "krilled": "エビにタゲられた", "krill": "暗黒竜(エビ)", "crabs": "カニ", "crab": "カニ", "creb": "カニ", "kreb": "カニ", "manta": "マンタ", "jellyfish": "クラゲ",
        "ascended candles": "星のキャンドル", "ascended candle": "星のキャンドル", "ac": "星のキャンドル", "candles": "キャンドル", "candle": "キャンドル", "hearts": "ハート", "heart": "ハート", "winged light": "光の翼", "wl": "光の翼", "wing buff": "翼のバフ", "spells": "魔法", "spell": "魔法", "potion": "ポーション", "instrument": "楽器", "prop": "持ち物", "cape": "ケープ", "mask": "マスク", "hair": "ヘアスタイル", "pants": "パンツ", "outfit": "衣装", "cosmetics": "コスメ(アイテム)", "iap": "課金アイテム", "igc": "ゲーム内通貨",
        "candle run": "キャンマラ", "cr": "キャンマラ", "heart trade": "ハート交換", "hr": "ハート交換", "wl run": "翼マラソン", "wlr": "翼マラソン(羽集め)", "geyser": "間欠泉", "grandma": "おばあちゃん", "turtle": "ウミガメ", "shard eruption": "破片の噴出", "shards": "闇の破片", "red shard": "赤石", "black shard": "黒石", "out of bounds": "裏世界", "oob": "裏世界(OOB)", "glitch": "バグ(すり抜け)", "honking": "大鳴き", "honk": "鳴く", "deep call": "大鳴き", "ubering": "引率するよ", "uber": "タクシー(引率)", "carry": "手をつなぐ", "warp": "ワープ", "tp": "テレポート", "server merge": "サーバー統合", "merge": "サーバー統合", "adopt a moth": "雀を拾う", "adopt": "保護する", "friend tree": "フレンドツリー", "constellation": "星座", "adventure pass": "アドベンチャーパス", "season pass": "シーズンパス", "season": "季節", "ap": "アドパス", "beta": "ベータ版", "live": "ライブ版", "moth drop": "雀を落とす",
        "yessir": "了解です！", "yessum": "はいよ！", "okey dokey": "おっけー！", "kk": "おけおけ", "sure thing": "いいとも", "ofc": "当然", "obv": "明らかに", "definitely": "間違いない", "defo": "絶対そう",
        "nope": "いやいや", "nah": "ううん", "naur": "ないってば", "naw": "ないわー", 
        "heya": "やっほー", "hihi": "どもども", "wassup": "うぃーっす", "sup": "調子どう？", "howdy": "ちわー", "gm": "おはよ", "gn": "おやすみ", "bro": "兄弟", "bruh": "おいおい", "dude": "お前", "yall": "みんな", "fam": "仲間", "bestie": "親友",
        "cya": "またね", "buhbye": "じゃあね", "laters": "じゃあな", "ttyl": "後で話そう", "gtg": "もう行かなきゃ", "g2g": "抜けるね", "brb": "すぐ戻る", "bbl": "後で戻る", "bbs": "すぐ戻るね", "wb": "おかえり", "afk": "離席中", "brt": "すぐ行く", "gnight": "おやすみー", "peace out": "あばよ",
        "lolz": "www", "lol": "笑", "lawl": "ワロタ", "lul": "草", "lmao": "爆笑", "kek": "草", "loool": "わろたああ",
        "wtf": "は？何それ", "wth": "何なんだよ", "omfg": "マジかよ", "wdym": "どういう意味？", "yikes": "うわぁ", "oof": "うっ(ダメージ)", "rip": "ご愁傷様", "sus": "怪しい",
        "tyvm": "本当にありがとう", "tysm": "超ありがとう！", "ty": "ありがとう", "thx": "ありがとう", "thnx": "サンクス！", "np": "問題ないよ", "yw": "どういたしまして", "srry": "ごめっ", "sry": "ごめん", "soz": "ごめーん", "my bad": "私のせいだ", "mb": "ごめん私のミス", "whoops": "あちゃー", "nevermind": "やっぱいいや", "nvm": "どんまい！気にしないで", "no worries": "気にすんな", "nw": "心配しないで",
        "fr": "マジで", "ngl": "ぶっちゃけ", "tbh": "正直言って", "imo": "個人的には", "imho": "ぶっちゃけ私の意見だと", "afaik": "私の知る限りでは", "idk": "わからん", "idc": "気にしない", "ik": "知ってる", "ikr": "だよね！", "rn": "今すぐ", "asap": "なる早で", "btw": "ところで", "smth": "何か", "bc": "なぜなら", "cuz": "だって", "pls": "お願い", "plz": "たのむ", "prolly": "おそらく", "prob": "たぶん", "kinda": "なんか", "dunno": "知らん", "wanna": "したい", "gonna": "するつもり", "gotta": "しなきゃ"
    };

    function appendTranslationGroup(originalText) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'translation-group';

        const sentDiv = document.createElement('div');
        sentDiv.className = 'message sent';
        sentDiv.textContent = originalText; // すでに無害化されたテキストが入る
        groupDiv.appendChild(sentDiv);

        const receivedDiv = document.createElement('div');
        receivedDiv.className = 'message received loading';
        receivedDiv.textContent = '翻訳中...';
        groupDiv.appendChild(receivedDiv);

        messagesContainer.appendChild(groupDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });

        return receivedDiv;
    }

    async function fetchGoogleTranslation(text) {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(text)}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('通信エラー');
            const data = await response.json();
            
            let translatedText = '';
            if (data && data[0]) {
                data[0].forEach(item => {
                    if (item[0]) translatedText += item[0];
                });
            }
            return translatedText.trim();
        } catch (error) {
            console.error(error);
            return 'エラー: 翻訳できませんでした。';
        }
    }

    async function processTranslation(text) {
        if (!text) return;

        // ★ 連投対策：1.5秒以内の連続リクエストは無視する
        const now = Date.now();
        if (now - lastRequestTime < 1500) {
            return;
        }
        lastRequestTime = now;

        // ★ XSS対策：悪意のある入力記号を無害化する
        const safeText = escapeHTML(text);

        // 重複チェック
        if (safeText === lastTranslatedText) return;
        lastTranslatedText = safeText;
        
        // 原文には無害化された安全なテキストを使用
        const resultDiv = appendTranslationGroup(safeText);
        
        // 翻訳処理（プレースホルダー方式）
        let processedText = safeText;
        let placeholders = {};
        let counter = 0;

        const sortedSlangs = Object.keys(slangDictionary).sort((a, b) => b.length - a.length);

        for (const slang of sortedSlangs) {
            const regex = new RegExp(`\\b${slang}\\b`, 'gi');
            if (regex.test(processedText)) {
                const marker = `【${counter}】`;
                placeholders[marker] = slangDictionary[slang];
                processedText = processedText.replace(regex, marker);
                counter++;
            }
        }

        let finalTranslation = await fetchGoogleTranslation(processedText);

        for (const[marker, meaning] of Object.entries(placeholders)) {
            const markerRegex = new RegExp(marker.replace('[', '\\[').replace(']', '\\]').replace(/(\d+)/, '\\s*$1\\s*'), 'g');
            finalTranslation = finalTranslation.replace(markerRegex, meaning);
            
            if (!finalTranslation.includes(meaning)) {
                finalTranslation += `\n(※${meaning})`;
            }
        }

        resultDiv.textContent = finalTranslation;
        resultDiv.classList.remove('loading');
    }

    async function readClipboardAndTranslate() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.trim() !== '') {
                let trimmedText = text.trim();
                
                // ★ 100文字制限チェック
                if (trimmedText.length > 100) {
                    alert('文字数が100文字を超えているため翻訳できません。\n(現在の文字数: ' + trimmedText.length + '文字)');
                    return;
                }
                
                processTranslation(trimmedText);
            }
        } catch (err) {
            console.log("クリップボードの読み取りがブロックされました", err);
        }
    }

    // 画面クリック時の自動翻訳
    document.addEventListener('mousedown', (e) => {
        if (e.target.tagName.toLowerCase() !== 'input') {
            readClipboardAndTranslate();
        }
    });

    // ウィンドウアクティブ時の自動翻訳
    window.addEventListener('focus', () => {
        setTimeout(readClipboardAndTranslate, 100);
    });

    // 手動入力での翻訳
    sendBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (text) {
            processTranslation(text);
            inputText.value = '';
        }
    });
    
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    // ペースト時の自動翻訳（文字数制限つき）
    inputText.addEventListener('paste', (e) => {
        // ペーストされたデータを取得
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        
        // ★ ペースト時も100文字制限をチェック
        if (pasteData.length > 100) {
            e.preventDefault(); // ペースト自体をキャンセル
            alert('文字数が100文字を超えているため翻訳できません。\n(現在の文字数: ' + pasteData.length + '文字)');
            return;
        }

        setTimeout(() => {
            let text = inputText.value.trim();
            if (text) {
                processTranslation(text);
                inputText.value = '';
            }
        }, 50);
    });
</script>

</body>
</html>
