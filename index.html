<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャット</title>
    
    <!-- Content Security Policy (CSP) : Google翻訳API以外の怪しい通信を完全ブロック -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://translate.googleapis.com;
        font-src 'self';
        img-src 'self' data:;
        base-uri 'self';
        form-action 'self';
    ">
    
    <style>
        /* Appleダークモードのカラーパレット */
        :root {
            --bg-color: #000000;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --msg-received-bg: #2c2c2e;
            --msg-received-text: #ffffff;
            --msg-sent-bg: #1c1c1e;
            --msg-sent-text: #a0a0a5;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 16px;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .version-date {
            font-size: 12px;
            color: #a0a0a5;
            font-weight: normal;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px 15px 120px 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            cursor: default;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .translation-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
        }

        .message {
            width: 100%;
            padding: 10px 15px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 16px;
            cursor: text;
        }

        .sent {
            background-color: var(--msg-sent-bg);
            color: var(--msg-sent-text);
            border-radius: 12px 12px 4px 4px;
            font-size: 14px;
        }

        .received {
            background-color: var(--msg-received-bg);
            color: var(--msg-received-text);
            border-radius: 4px 4px 12px 12px;
            font-weight: 500;
        }

        .loading {
            opacity: 0.6;
            font-size: 14px;
            color: #ff9f0a;
        }

        #input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: default;
        }

        #paste-btn {
            background-color: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .manual-input {
            display: flex;
            gap: 10px;
        }
        .manual-input input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 16px;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .manual-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .manual-input button {
            background-color: #30d158;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manual-input button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        翻訳 <span class="version-date">v2026.05.04.3</span>
    </div>
    
    <div id="messages">
        <div class="translation-group">
            <div class="message sent">ここにコピーした文章が表示されます</div>
            <div class="message received">画面のどこかをクリックするだけで自動翻訳</div>
        </div>
    </div>
    
    <div id="input-area">
        <button id="paste-btn">📋 コピーした文字を翻訳</button>
        <div class="manual-input">
            <!-- 100文字制限 -->
            <input type="text" id="input-text" placeholder="ここにペースト(Ctrl+V)してもOK..." maxlength="100">
            <button id="send-btn">↑</button>
        </div>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const inputText = document.getElementById('input-text');
    const sendBtn = document.getElementById('send-btn');

    let lastTranslatedText = "";
    let lastRequestTime = 0; // 短期連投無視タイマー
    let lastErrorText = ""; // アラート無限ループ防止

    // 高度な連投制限（トークンバケット）用の変数
    const MAX_TOKENS = 10;
    let tokens = MAX_TOKENS;
    let lastTokenUpdateTime = Date.now();
    let cooldownUntil = 0;
    let isCooldownNotified = false;

    // XSS対策
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, function(match) {
            const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
            return escape[match];
        });
    }

    // ★ 1. 事前置換辞書（自然なダミー置換方式）★
    // Google翻訳の誤訳や語順崩壊を防ぐため、「日常略語(wannaなど)」は除外し、
    // Sky用語のみを「Googleが文脈を間違えない一般名詞や代名詞(It, Playerなど)」に置き換える。
    // 配列の中身：[ "ダミー英単語", "Googleが訳すダミーの日本語", "最終的に表示したい本来の意味" ]
    const slangDictionary = {
        // キャラクター関連（Player, Guide などに置換）
        "skykid":["Player", "プレイヤー", "星の子"],
        "skid": ["Player", "プレイヤー", "星の子"],
        "mothy":["Newbie", "初心者", "雀ちゃん(初心者)"],
        "moths":["Newbies", "初心者", "雀たち"],
        "moth": ["Newbie", "初心者", "雀(初心者)"],
        "butterfly":["Guide", "ガイド", "蝶(中級者)"],
        "vet":["Veteran", "ベテラン", "ベテラン"],
        "veteran":["Veteran", "ベテラン", "ベテラン"],
        "ikemen": ["Hero", "ヒーロー", "イケメン"],
        "ikejou":["Hero", "ヒーロー", "イケジョ"],
        "chibi": ["Child", "子供", "リトル"],
        "capeless": ["Baby", "赤ちゃん", "羽なし"],
        
        // エリア関連（Place, Area, Land などに置換）
        "isle of dawn":["Island", "島", "孤島"],
        "isle": ["Island", "島", "孤島"],
        "daylight prairie":["Field", "分野", "草原"], // Fieldの直訳ブレ対策
        "prairie":["Field", "フィールド", "草原"],
        "hidden forest": ["Forest", "森", "雨林"],
        "forest":["Forest", "森", "雨林"],
        "valley of triumph":["Valley", "谷", "峡谷"],
        "valley": ["Valley", "谷", "峡谷"],
        "golden wasteland":["Wasteland", "荒れ地", "捨て地"],
        "wasteland":["Wasteland", "荒れ地", "捨て地"],
        "gw": ["Wasteland", "荒れ地", "捨て地"],
        "vault of knowledge":["Library", "と書室", "書庫"], // library訳ブレ対策
        "vault":["Library", "図書館", "書庫"],
        "eye of eden": ["Mountain", "山", "原罪"],
        "eden":["Mountain", "山", "原罪"],
        "home":["Home", "家", "ホーム"],
        "aviary village":["Village", "村", "花鳥郷"],
        "aviary":["Village", "村", "花鳥郷"],
        "office": ["Office", "オフィス", "オフィス"],
        "orbit": ["Space", "宇宙", "天空"],
        "sanctuary islands":["Resort", "リゾート", "楽園の島々"],
        "sanctuary": ["Resort", "リゾート", "楽園"],
        "cave of prophecies": ["Cave", "洞窟", "予言の石窟"],
        "prophecy":["Cave", "洞窟", "予言の石窟"],
        "trials":["Trials", "裁判", "試練"],
        "water trial": ["River", "川", "水の試練"],
        "earth trial":["Earth", "地球", "地の試練"],
        "air trial":["Air", "空気", "風の試練"],
        "fire trial": ["Fire", "火", "火の試練"],
        "treehouse":["Treehouse", "ツリーハウス", "大樹の巣"],
        "starlight desert":["Desert", "砂漠", "星月夜の砂漠"],
        "village of dreams":["Town", "町", "夢見の町"],
        
        // 精霊・生物関連（Spirit, Monster などに置換）
        "traveling spirit": ["Spirit", "精神", "再訪する精霊"],
        "ts":["Spirit", "精神", "再訪精霊"],
        "spirits":["Spirits", "精霊", "精霊"],
        "spirit": ["Spirit", "精神", "精霊"],
        "elders":["Elders", "長老", "大精霊"],
        "elder":["Elder", "長老", "大精霊"],
        "dark dragon": ["Monster", "モンスター", "暗黒竜"],
        "krill":["Monster", "モンスター", "暗黒竜(エビ)"],
        "crabs":["Crabs", "カニ", "カニ"],
        "crab":["Crab", "カニ", "カニ"],
        "creb":["Crab", "カニ", "カニ"],
        "kreb": ["Crab", "カニ", "カニ"],
        "manta": ["Bird", "鳥", "マンタ"],
        "jellyfish":["Fish", "魚", "クラゲ"],
        
        // アイテム・行動関連（Item, Run などに置換）
        "ascended candles":["Ruby", "ルビー", "星のキャンドル"],
        "ascended candle":["Ruby", "ルビー", "星のキャンドル"],
        "ac": ["Ruby", "ルビー", "星のキャンドル"],
        "candles":["Candles", "キャンドル", "キャンドル"],
        "candle":["Candle", "キャンドル", "キャンドル"],
        "hearts": ["Hearts", "ハーツ", "ハート"],
        "heart":["Heart", "ハート", "ハート"],
        "winged light": ["Light", "光", "光の翼"],
        "wl":["Light", "光", "光の翼"],
        "wing buff":["Buff", "バフ", "翼のバフ"],
        "spells": ["Spells", "呪文", "魔法"],
        "spell": ["Spell", "呪文", "魔法"],
        "potion":["Potion", "ポーション", "ポーション"],
        "instrument": ["Instrument", "楽器", "楽器"],
        "prop":["Item", "アイテム", "持ち物"],
        "cape":["Cape", "ケープ", "ケープ"],
        "mask": ["Mask", "マスク", "マスク"],
        "hair":["Hair", "髪", "ヘアスタイル"],
        "pants": ["Pants", "パンツ", "パンツ"],
        "outfit":["Outfit", "衣装", "衣装"],
        "cosmetics":["Cosmetics", "化粧品", "コスメ(アイテム)"],
        "iap": ["Ticket", "切符", "課金アイテム"],
        "igc":["Coin", "コイン", "ゲーム内通貨"],
        "candle run":["Marathon", "マラソン", "キャンマラ"],
        "cr":["Marathon", "マラソン", "キャンマラ"],
        "heart trade":["Trade", "貿易", "ハート交換"],
        "hr": ["Trade", "貿易", "ハート交換"],
        "wl run":["Run", "走る", "翼マラソン"],
        "wlr":["Run", "走る", "翼マラソン(羽集め)"],
        "geyser":["Geyser", "間欠泉", "間欠泉"],
        "grandma": ["Grandma", "おばあちゃん", "おばあちゃん"],
        "turtle":["Turtle", "カメ", "ウミガメ"],
        "shard eruption":["Eruption", "噴火", "破片の噴出"],
        "shards":["Shards", "破片", "闇の破片"],
        "red shard": ["Red", "赤", "赤石"],
        "black shard": ["Black", "黒", "黒石"],
        "out of bounds":["Secret", "秘密", "裏世界"],
        "oob":["Secret", "秘密", "裏世界(OOB)"],
        "glitch": ["Bug", "バグ", "バグ(すり抜け)"],
        "server merge": ["Merge", "マージ", "サーバー統合"],
        "merge":["Merge", "マージ", "サーバー統合"],
        "adopt a moth":["Adopt", "採用する", "雀を拾う"],
        "adopt": ["Adopt", "採用する", "保護する"],
        "friend tree":["Tree", "木", "フレンドツリー"],
        "constellation": ["Star", "星", "星座"],
        "adventure pass":["Pass", "パス", "アドベンチャーパス"],
        "season pass":["Pass", "パス", "シーズンパス"],
        "season":["Season", "季節", "季節"],
        "ap":["Pass", "パス", "アドパス"],
        "beta":["Beta", "ベータ版", "ベータ版"],
        "live": ["Live", "住む", "ライブ版"],
        "moth drop":["Drop", "落とす", "雀を落とす"]
        
        // ※ 日常略語（wanna, brb等）はGoogleの意訳に任せるため全て削除しました
    };

    // ★ 2. 事後置換辞書（動詞用）★
    // Google翻訳に自然に直訳させたあとで、日本語をこっそり修正・マイルドにする単語
    const postTranslationDictionary = {
        "クラクションを鳴らして": "鳴いて",
        "クラクションを鳴らし": "鳴き",
        "クラクションを鳴らす": "鳴いて(鳴く)",
        "クラクション": "鳴き声",
        "深く鳴く": "大鳴き",
        "クリルされた": "エビにタゲられた",
        "タクシーの運転手": "引率するよ",
        "運ぶ": "手をつなぐ",
        "運んで": "手をつないで"
    };

    function appendMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.textContent = text;
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
        return msgDiv;
    }

    function appendTranslationGroup(originalText) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'translation-group';

        const sentDiv = document.createElement('div');
        sentDiv.className = 'message sent';
        sentDiv.textContent = originalText;
        groupDiv.appendChild(sentDiv);

        const receivedDiv = document.createElement('div');
        receivedDiv.className = 'message received loading';
        receivedDiv.textContent = '翻訳中...';
        groupDiv.appendChild(receivedDiv);

        messagesContainer.appendChild(groupDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });

        return receivedDiv;
    }

    async function fetchGoogleTranslation(text) {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(text)}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('通信エラー');
            const data = await response.json();
            
            let translatedText = '';
            if (data && data[0]) {
                data[0].forEach(item => {
                    if (item[0]) translatedText += item[0];
                });
            }
            return translatedText.trim();
        } catch (error) {
            console.error(error);
            return 'エラー: 翻訳サーバーに接続できませんでした。';
        }
    }

    async function processTranslation(text) {
        if (!text) return;

        // ★ 日本語のみの判定（日常略語を除外したため、ここの例外リストは維持）
        const allowedEnglishWords =['sky', 'ok', 'gg', 'ty', 'thx', 'np', 'brb', 'wanna', 'pls'];
        let checkText = text.toLowerCase();
        
        for (const word of allowedEnglishWords) {
            checkText = checkText.split(word).join('');
        }
        checkText = checkText.replace(/w+/g, '');
        
        if (!/[a-z]/.test(checkText)) {
            if (text === lastTranslatedText) return;
            lastTranslatedText = text;
            const resultDiv = appendTranslationGroup(escapeHTML(text));
            resultDiv.textContent = text;
            resultDiv.classList.remove('loading');
            resultDiv.style.color = 'var(--msg-received-text)';
            return;
        }

        // --- セキュリティ・連投制限 ---
        const now = Date.now();

        if (now < cooldownUntil) {
            if (!isCooldownNotified) {
                const remainingSec = Math.ceil((cooldownUntil - now) / 1000);
                appendMessage(`⚠️ スパム防止のため一時的に翻訳を制限しています。\nあと ${remainingSec} 秒お待ちください。`, 'received loading');
                isCooldownNotified = true;
            }
            return;
        }

        if (now - lastRequestTime < 1500) return;
        lastRequestTime = now;

        const elapsed = now - lastTokenUpdateTime;
        const restoreAmount = Math.floor(elapsed / 10000);
        if (restoreAmount > 0) {
            tokens = Math.min(MAX_TOKENS, tokens + restoreAmount);
            lastTokenUpdateTime = now - (elapsed % 10000);
        }

        if (tokens > 0) {
            tokens--;
            isCooldownNotified = false;
        } else {
            cooldownUntil = now + 180000;
            appendMessage(`🚫 【警告】異常な連続リクエストを検知しました。\nGoogleサーバー保護のため、3分間翻訳を停止します。`, 'received loading');
            isCooldownNotified = true;
            return;
        }

        const safeText = escapeHTML(text);

        if (safeText === lastTranslatedText) return;
        lastTranslatedText = safeText;
        
        const resultDiv = appendTranslationGroup(safeText);
        
        // --- 1. 事前置換（自然なダミーネーム方式） ---
        let processedText = safeText;
        let restoreDictionary = {};

        const sortedSlangs = Object.keys(slangDictionary).sort((a, b) => b.length - a.length);

        for (const slang of sortedSlangs) {
            const regex = new RegExp(`\\b${slang}\\b`, 'gi');
            if (regex.test(processedText)) {
                // ダミーの英単語に置き換える（Googleが文法を間違えないようにする）
                const dummyWord = slangDictionary[slang][0];
                const dummyJapanese = slangDictionary[slang][1];
                const finalMeaning = slangDictionary[slang][2];
                
                processedText = processedText.replace(regex, dummyWord);
                restoreDictionary[dummyJapanese] = finalMeaning;
            }
        }

        // --- 2. Google翻訳 ---
        let finalTranslation = await fetchGoogleTranslation(processedText);

        // --- 3. 事前置換の復元（ダミーの日本語を、本来のゲーム用語に直す） ---
        for (const[dummyJp, finalMeaning] of Object.entries(restoreDictionary)) {
            const jpRegex = new RegExp(dummyJp, 'g');
            finalTranslation = finalTranslation.replace(jpRegex, finalMeaning);
            
            // 保険：Googleがダミー単語を意訳して消してしまった場合のみ追記する
            if (!finalTranslation.includes(finalMeaning)) {
                finalTranslation += `\n(※${finalMeaning})`;
            }
        }

        // --- 4. 事後置換（動詞や誤訳の修正） ---
        const sortedPostKeys = Object.keys(postTranslationDictionary).sort((a, b) => b.length - a.length);
        for (const key of sortedPostKeys) {
            const regex = new RegExp(key, 'gi');
            if (regex.test(finalTranslation)) {
                finalTranslation = finalTranslation.replace(regex, postTranslationDictionary[key]);
            }
        }

        // 成功時の表示
        resultDiv.textContent = finalTranslation;
        resultDiv.classList.remove('loading');
        resultDiv.style.color = 'var(--msg-received-text)';
    }

    async function readClipboardAndTranslate() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.trim() !== '') {
                let trimmedText = text.trim();
                
                // 100文字制限のチェックとアラート無限ループ防止
                if (trimmedText.length > 100) {
                    if (trimmedText !== lastErrorText) {
                        lastErrorText = trimmedText;
                        alert('文字数が100文字を超えているため翻訳できません。\n(現在の文字数: ' + trimmedText.length + '文字)');
                    }
                    return;
                }
                
                lastErrorText = "";
                processTranslation(trimmedText);
            }
        } catch (err) {
            console.log("クリップボードの読み取りがブロックされました", err);
        }
    }

    document.addEventListener('mousedown', (e) => {
        if (e.target.tagName.toLowerCase() !== 'input') {
            readClipboardAndTranslate();
        }
    });

    window.addEventListener('focus', () => {
        setTimeout(readClipboardAndTranslate, 100);
    });

    sendBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (text) {
            processTranslation(text);
            inputText.value = '';
        }
    });
    
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    inputText.addEventListener('paste', (e) => {
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        
        // ペースト時も100文字制限チェック
        if (pasteData.length > 100) {
            e.preventDefault();
            alert('文字数が100文字を超えているため翻訳できません。\n(現在の文字数: ' + pasteData.length + '文字)');
            return;
        }

        setTimeout(() => {
            let text = inputText.value.trim();
            if (text) {
                processTranslation(text);
                inputText.value = '';
            }
        }, 50);
    });
</script>

</body>
</html>
