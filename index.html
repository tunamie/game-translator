<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャット</title>
    <style>
        /* Appleダークモードのカラーパレット */
        :root {
            --bg-color: #000000;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --msg-received-bg: #2c2c2e;
            --msg-received-text: #ffffff;
            --msg-sent-bg: #0a84ff;
            --msg-sent-text: #ffffff;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* 画面全体をクリックできるようにカーソルを変更 */
            cursor: pointer;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ヘッダー */
        #header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 22px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .version-date {
            font-size: 14px;
            color: #a0a0a5;
            font-weight: normal;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 80px 20px 160px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            cursor: default; /* メッセージエリアは通常のカーソルに戻す */
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 22px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            cursor: text; /* 文字は選択できるように */
        }

        .sent {
            align-self: flex-end;
            background-color: var(--msg-sent-bg);
            color: var(--msg-sent-text);
            border-bottom-right-radius: 4px;
        }

        .received {
            align-self: flex-start;
            background-color: var(--msg-received-bg);
            color: var(--msg-received-text);
            border-bottom-left-radius: 4px;
        }

        .loading {
            opacity: 0.6;
            font-size: 18px;
        }

        #input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            padding: 15px 20px 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            cursor: default;
        }

        #paste-btn {
            background-color: var(--msg-sent-bg);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: opacity 0.2s;
            pointer-events: none; /* 画面全体のクリックイベントを優先させるためにボタン自体の判定を消す */
        }

        .manual-input {
            display: flex;
            gap: 12px;
        }
        .manual-input input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 20px;
            padding: 12px 18px;
            font-size: 18px;
            outline: none;
        }
        .manual-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .manual-input button {
            background-color: #30d158;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manual-input button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        翻訳 <span class="version-date">v2026.04.23.2</span>
    </div>
    
    <div id="messages">
        <!-- 初期メッセージ -->
        <div class="message received">画面のどこかをクリックするだけで自動翻訳</div>
    </div>
    
    <div id="input-area">
        <!-- 見た目だけのボタン（機能は画面全体のクリックに統合） -->
        <button id="paste-btn">📋 コピーした文字を翻訳</button>
        
        <div class="manual-input">
            <input type="text" id="input-text" placeholder="ここにペースト(Ctrl+V)してもOK...">
            <button id="send-btn">↑</button>
        </div>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const inputText = document.getElementById('input-text');
    const sendBtn = document.getElementById('send-btn');

    // ★ 連続翻訳を防ぐための変数（直前に翻訳したテキストを記憶）★
    let lastTranslatedText = "";

    // ★ Sky 星を紡ぐ子どもたち (Sky: Children of the Light) 専用辞書 ★
    const slangDictionary = {
        // --- Sky: キャラクター・プレイヤー層 ---
        "skykid": "星の子", "skid": "星の子", "moth": "雀(初心者)", "moths": "雀たち", "butterfly": "蝶(中級者)", "vet": "ベテラン", "veteran": "ベテラン", "ikemen": "イケメン", "ikejou": "イケジョ", "chibi": "リトル", "capeless": "羽なし",
        // --- Sky: エリア・場所 ---
        "isle": "孤島", "isle of dawn": "孤島", "prairie": "草原", "daylight prairie": "草原", "forest": "雨林", "hidden forest": "雨林", "valley": "峡谷", "valley of triumph": "峡谷", "wasteland": "捨て地", "gw": "捨て地", "golden wasteland": "捨て地", "vault": "書庫", "vault of knowledge": "書庫", "eden": "原罪", "eye of eden": "原罪", "home": "ホーム", "aviary": "花鳥郷", "aviary village": "花鳥郷", "office": "オフィス", "orbit": "天空", "sanctuary": "楽園の島々", "sanctuary islands": "楽園", "prophecy": "予言の石窟", "cave of prophecies": "予言の石窟", "trials": "試練", "water trial": "水の試練", "earth trial": "地の試練", "air trial": "風の試練", "fire trial": "火の試練", "treehouse": "大樹の巣", "starlight desert": "星月夜の砂漠", "village of dreams": "夢見の町",
        // --- Sky: 精霊・生物 ---
        "spirit": "精霊", "spirits": "精霊", "ts": "再訪精霊", "traveling spirit": "再訪する精霊", "elder": "大精霊", "elders": "大精霊", "krill": "暗黒竜(エビ)", "dark dragon": "暗黒竜", "krilled": "エビにタゲられた", "crab": "カニ", "crabs": "カニ", "creb": "カニ", "kreb": "カニ", "manta": "マンタ", "jellyfish": "クラゲ",
        // --- Sky: アイテム・通貨・魔法 ---
        "candle": "キャンドル", "candles": "キャンドル", "heart": "ハート", "hearts": "ハート", "wl": "光の翼", "winged light": "光の翼", "wing buff": "翼のバフ", "ac": "星のキャンドル", "ascended candle": "星のキャンドル", "ascended candles": "星のキャンドル", "spell": "魔法", "spells": "魔法", "potion": "ポーション", "instrument": "楽器", "prop": "持ち物", "cape": "ケープ", "mask": "マスク", "hair": "ヘアスタイル", "pants": "パンツ", "outfit": "衣装", "cosmetics": "コスメ(アイテム)", "iap": "課金アイテム", "igc": "ゲーム内通貨",
        // --- Sky: アクション・プレイスタイル ---
        "cr": "キャンマラ", "candle run": "キャンマラ", "hr": "ハート交換", "heart trade": "ハート交換", "wlr": "翼マラソン(羽集め)", "wl run": "翼マラソン", "geyser": "間欠泉", "grandma": "おばあちゃん", "turtle": "ウミガメ", "shards": "闇の破片", "shard eruption": "破片の噴出", "red shard": "赤石(赤い破片)", "black shard": "黒石(黒い破片)", "oob": "裏世界(OOB)", "out of bounds": "裏世界", "glitch": "バグ(すり抜け)", "honk": "鳴く", "honking": "大鳴き", "deep call": "大鳴き", "uber": "タクシー(引率)", "ubering": "引率するよ", "carry": "手をつなぐ(キャリー)", "warp": "ワープ", "tp": "テレポート", "merge": "サーバー統合", "server merge": "サーバー統合", "adopt": "保護する", "adopt a moth": "雀を拾う", "friend tree": "フレンドツリー", "constellation": "星座", "season": "季節", "ap": "アドパス", "adventure pass": "アドベンチャーパス", "season pass": "シーズンパス", "beta": "ベータ版", "live": "ライブ版", "moth drop": "雀を落とす",
        // --- 挨拶・相槌・日常の略語 ---
        "yessir": "了解です！", "yessum": "はいよ！", "kk": "おけおけ", "okey dokey": "おっけー！", "sure thing": "いいとも", "ofc": "当然", "obv": "明らかに", "defo": "絶対そう", "definitely": "間違いない",
        "nah": "ううん", "nope": "いやいや", "naur": "ないってば", "naw": "ないわー", 
        "heya": "やっほー", "hihi": "どもども", "sup": "調子どう？", "wassup": "うぃーっす", "howdy": "ちわー", "gm": "おはよ", "gn": "おやすみ", "bro": "兄弟", "bruh": "おいおい", "dude": "お前", "yall": "みんな", "fam": "仲間", "bestie": "親友",
        "cya": "またね", "buhbye": "じゃあね", "laters": "じゃあな", "ttyl": "後で話そう", "gtg": "もう行かなきゃ", "g2g": "抜けるね", "brb": "すぐ戻る", "bbl": "後で戻る", "bbs": "すぐ戻るね", "wb": "おかえり", "afk": "離席中", "brt": "すぐ行く", "gnight": "おやすみー", "peace out": "あばよ",
        // --- 笑い・驚き・感謝 ---
        "lol": "笑", "lolz": "www", "lawl": "ワロタ", "lul": "草", "lmao": "爆笑", "kek": "草", "loool": "わろたああ",
        "wtf": "は？何それ", "wth": "何なんだよ", "omfg": "マジかよ", "wdym": "どういう意味？", "yikes": "うわぁ", "oof": "うっ(ダメージ)", "rip": "ご愁傷様", "sus": "怪しい",
        "ty": "ありがとう", "thx": "ありがとう", "thnx": "サンクス！", "tysm": "超ありがとう！", "tyvm": "本当にありがとう", "np": "問題ないよ", "yw": "どういたしまして", "sry": "ごめん", "srry": "ごめっ", "soz": "ごめーん", "mb": "ごめん私のミス", "my bad": "私のせいだ", "whoops": "あちゃー", "nvm": "どんまい！気にしないで", "nevermind": "やっぱいいや", "nw": "心配しないで", "no worries": "気にすんな",
        // --- ネットスラング ---
        "fr": "マジで", "ngl": "ぶっちゃけ", "tbh": "正直言って", "imo": "個人的には", "imho": "ぶっちゃけ私の意見だと", "afaik": "私の知る限りでは", "idk": "わからん", "idc": "気にしない", "ik": "知ってる", "ikr": "だよね！", "rn": "今すぐ", "asap": "なる早で", "btw": "ところで", "smth": "何か", "bc": "なぜなら", "cuz": "だって", "pls": "お願い", "plz": "たのむ", "prob": "たぶん", "prolly": "おそらく", "kinda": "なんか", "dunno": "知らん", "wanna": "したい", "gonna": "するつもり", "gotta": "しなきゃ"
    };

    function appendMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.textContent = text;
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
        return msgDiv;
    }

    async function translateText(text) {
        let processedText = text;
        
        // 辞書の単語を検索して置換
        const slangRegex = new RegExp(`\\b(${Object.keys(slangDictionary).join('|')})\\b`, 'gi');
        processedText = processedText.replace(slangRegex, (match) => {
            return ` ${slangDictionary[match.toLowerCase()]} `;
        });

        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(processedText)}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('通信エラー');
            const data = await response.json();
            
            let translatedText = '';
            if (data && data[0]) {
                data[0].forEach(item => {
                    if (item[0]) translatedText += item[0];
                });
            }
            return translatedText.trim();
        } catch (error) {
            console.error(error);
            return 'エラー: 翻訳できませんでした。インターネット接続を確認してください。';
        }
    }

    // ★ 翻訳処理のメイン関数（重複チェックを追加） ★
    async function processTranslation(text) {
        if (!text) return;
        
        // 同じテキストを連続で翻訳しようとした場合は無視（1クリックで複数回発火するのを防ぐ）
        if (text === lastTranslatedText) return;
        
        lastTranslatedText = text; // 今回翻訳したテキストを記憶
        
        appendMessage(text, 'sent');
        const loadingMsg = appendMessage('翻訳中...', 'received loading');
        const translatedText = await translateText(text);
        messagesContainer.removeChild(loadingMsg);
        appendMessage(translatedText, 'received');
    }

    // ★ クリップボードから読み取って翻訳を実行する関数 ★
    async function readClipboardAndTranslate() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.trim() !== '') {
                processTranslation(text.trim());
            }
        } catch (err) {
            console.log("クリップボードの読み取りがブロックされました", err);
        }
    }

    // ==========================================
    // ★ 1クリックでアクティブ化＆自動翻訳の仕組み ★
    // ==========================================

    // 【1】画面の「どこか」をクリック(マウスダウン)した瞬間に翻訳を走らせる
    document.addEventListener('mousedown', (e) => {
        // もし手動入力欄（input）をクリックした場合は文字入力の邪魔をしないように除外
        if (e.target.tagName.toLowerCase() !== 'input') {
            readClipboardAndTranslate();
        }
    });

    // 【2】ウィンドウが裏(非アクティブ)から表(アクティブ)になった瞬間に翻訳を走らせる
    window.addEventListener('focus', () => {
        // OS側の準備が整うまで少しだけ(0.1秒)遅らせて実行する
        setTimeout(readClipboardAndTranslate, 100);
    });

    // ==========================================
    // 手動入力・エンターキーでの翻訳（予備機能）
    // ==========================================
    
    sendBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (text) {
            processTranslation(text);
            inputText.value = '';
        }
    });
    
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    // 入力欄に直接ペースト(Ctrl+V)した場合の自動送信
    inputText.addEventListener('paste', () => {
        setTimeout(() => {
            const text = inputText.value.trim();
            if (text) {
                processTranslation(text);
                inputText.value = '';
            }
        }, 50);
    });

</script>

</body>
</html>
