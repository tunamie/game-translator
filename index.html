<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻訳チャット</title>
    <style>
        /* Appleダークモードのカラーパレット */
        :root {
            --bg-color: #000000;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --msg-received-bg: #2c2c2e;
            --msg-received-text: #ffffff;
            --msg-sent-bg: #1c1c1e; /* 原文の背景を少し暗めのグレーに */
            --msg-sent-text: #a0a0a5; /* 原文の文字色を少し薄くしてメリハリを出す */
            --border-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 16px; /* 文字サイズを少し小さく調整 */
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ヘッダー */
        #header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .version-date {
            font-size: 12px;
            color: #a0a0a5;
            font-weight: normal;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* メッセージエリア */
        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 60px 15px 120px 15px; /* 上下の余白を調整し、表示領域を広く */
            display: flex;
            flex-direction: column;
            gap: 25px; /* セットとセットの間の余白を広く取る */
            cursor: default;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* 原文と翻訳文をグループ化する枠 */
        .translation-group {
            display: flex;
            flex-direction: column;
            gap: 2px; /* 原文と翻訳文の間を限界まで詰める */
            width: 100%;
        }

        /* 吹き出しの共通スタイル */
        .message {
            width: 100%; /* 横幅いっぱいを使う */
            padding: 10px 15px; /* 上下の余白を狭く調整 */
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 16px;
            cursor: text;
        }

        /* 上段（コピーした原文） */
        .sent {
            background-color: var(--msg-sent-bg);
            color: var(--msg-sent-text);
            border-radius: 12px 12px 4px 4px; /* 上を丸く、下を少し平らに */
            font-size: 14px; /* 原文は少し小さく */
        }

        /* 下段（翻訳結果） */
        .received {
            background-color: var(--msg-received-bg);
            color: var(--msg-received-text);
            border-radius: 4px 4px 12px 12px; /* 上を少し平らに、下を丸く */
            font-weight: 500;
        }

        .loading {
            opacity: 0.6;
            font-size: 14px;
        }

        /* 入力エリア */
        #input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: default;
        }

        /* 青いボタン（細く調整） */
        #paste-btn {
            background-color: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px; /* 余白を狭くして細く */
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            width: 100%;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .manual-input {
            display: flex;
            gap: 10px;
        }
        .manual-input input {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 16px;
            padding: 8px 15px;
            font-size: 14px;
            outline: none;
        }
        .manual-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .manual-input button {
            background-color: #30d158;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manual-input button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        翻訳 <span class="version-date">v2026.04.23.3</span>
    </div>
    
    <div id="messages">
        <div class="translation-group">
            <div class="message sent">ここにコピーした文章が表示されます</div>
            <div class="message received">画面のどこかをクリックするだけで自動翻訳</div>
        </div>
    </div>
    
    <div id="input-area">
        <button id="paste-btn">📋 コピーした文字を翻訳</button>
        <div class="manual-input">
            <input type="text" id="input-text" placeholder="ここにペースト(Ctrl+V)してもOK...">
            <button id="send-btn">↑</button>
        </div>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const inputText = document.getElementById('input-text');
    const sendBtn = document.getElementById('send-btn');

    let lastTranslatedText = "";

    // ★ Sky 星を紡ぐ子どもたち 専用辞書 ★
    const slangDictionary = {
        "skykid": "星の子", "skid": "星の子", "moth": "雀(初心者)", "moths": "雀たち", "butterfly": "蝶(中級者)", "vet": "ベテラン", "veteran": "ベテラン", "ikemen": "イケメン", "ikejou": "イケジョ", "chibi": "リトル", "capeless": "羽なし",
        "isle": "孤島", "isle of dawn": "孤島", "prairie": "草原", "daylight prairie": "草原", "forest": "雨林", "hidden forest": "雨林", "valley": "峡谷", "valley of triumph": "峡谷", "wasteland": "捨て地", "gw": "捨て地", "golden wasteland": "捨て地", "vault": "書庫", "vault of knowledge": "書庫", "eden": "原罪", "eye of eden": "原罪", "home": "ホーム", "aviary": "花鳥郷", "aviary village": "花鳥郷", "office": "オフィス", "orbit": "天空", "sanctuary": "楽園の島々", "sanctuary islands": "楽園", "prophecy": "予言の石窟", "cave of prophecies": "予言の石窟", "trials": "試練", "water trial": "水の試練", "earth trial": "地の試練", "air trial": "風の試練", "fire trial": "火の試練", "treehouse": "大樹の巣", "starlight desert": "星月夜の砂漠", "village of dreams": "夢見の町",
        "spirit": "精霊", "spirits": "精霊", "ts": "再訪精霊", "traveling spirit": "再訪する精霊", "elder": "大精霊", "elders": "大精霊", "krill": "暗黒竜(エビ)", "dark dragon": "暗黒竜", "krilled": "エビにタゲられた", "crab": "カニ", "crabs": "カニ", "creb": "カニ", "kreb": "カニ", "manta": "マンタ", "jellyfish": "クラゲ",
        "candle": "キャンドル", "candles": "キャンドル", "heart": "ハート", "hearts": "ハート", "wl": "光の翼", "winged light": "光の翼", "wing buff": "翼のバフ", "ac": "星のキャンドル", "ascended candle": "星のキャンドル", "ascended candles": "星のキャンドル", "spell": "魔法", "spells": "魔法", "potion": "ポーション", "instrument": "楽器", "prop": "持ち物", "cape": "ケープ", "mask": "マスク", "hair": "ヘアスタイル", "pants": "パンツ", "outfit": "衣装", "cosmetics": "コスメ(アイテム)", "iap": "課金アイテム", "igc": "ゲーム内通貨",
        "cr": "キャンマラ", "candle run": "キャンマラ", "hr": "ハート交換", "heart trade": "ハート交換", "wlr": "翼マラソン(羽集め)", "wl run": "翼マラソン", "geyser": "間欠泉", "grandma": "おばあちゃん", "turtle": "ウミガメ", "shards": "闇の破片", "shard eruption": "破片の噴出", "red shard": "赤石(赤い破片)", "black shard": "黒石(黒い破片)", "oob": "裏世界(OOB)", "out of bounds": "裏世界", "glitch": "バグ(すり抜け)", "honk": "鳴く", "honking": "大鳴き", "deep call": "大鳴き", "uber": "タクシー(引率)", "ubering": "引率するよ", "carry": "手をつなぐ(キャリー)", "warp": "ワープ", "tp": "テレポート", "merge": "サーバー統合", "server merge": "サーバー統合", "adopt": "保護する", "adopt a moth": "雀を拾う", "friend tree": "フレンドツリー", "constellation": "星座", "season": "季節", "ap": "アドパス", "adventure pass": "アドベンチャーパス", "season pass": "シーズンパス", "beta": "ベータ版", "live": "ライブ版", "moth drop": "雀を落とす",
        "yessir": "了解です！", "yessum": "はいよ！", "kk": "おけおけ", "okey dokey": "おっけー！", "sure thing": "いいとも", "ofc": "当然", "obv": "明らかに", "defo": "絶対そう", "definitely": "間違いない",
        "nah": "ううん", "nope": "いやいや", "naur": "ないってば", "naw": "ないわー", 
        "heya": "やっほー", "hihi": "どもども", "sup": "調子どう？", "wassup": "うぃーっす", "howdy": "ちわー", "gm": "おはよ", "gn": "おやすみ", "bro": "兄弟", "bruh": "おいおい", "dude": "お前", "yall": "みんな", "fam": "仲間", "bestie": "親友",
        "cya": "またね", "buhbye": "じゃあね", "laters": "じゃあな", "ttyl": "後で話そう", "gtg": "もう行かなきゃ", "g2g": "抜けるね", "brb": "すぐ戻る", "bbl": "後で戻る", "bbs": "すぐ戻るね", "wb": "おかえり", "afk": "離席中", "brt": "すぐ行く", "gnight": "おやすみー", "peace out": "あばよ",
        "lol": "笑", "lolz": "www", "lawl": "ワロタ", "lul": "草", "lmao": "爆笑", "kek": "草", "loool": "わろたああ",
        "wtf": "は？何それ", "wth": "何なんだよ", "omfg": "マジかよ", "wdym": "どういう意味？", "yikes": "うわぁ", "oof": "うっ(ダメージ)", "rip": "ご愁傷様", "sus": "怪しい",
        "ty": "ありがとう", "thx": "ありがとう", "thnx": "サンクス！", "tysm": "超ありがとう！", "tyvm": "本当にありがとう", "np": "問題ないよ", "yw": "どういたしまして", "sry": "ごめん", "srry": "ごめっ", "soz": "ごめーん", "mb": "ごめん私のミス", "my bad": "私のせいだ", "whoops": "あちゃー", "nvm": "どんまい！気にしないで", "nevermind": "やっぱいいや", "nw": "心配しないで", "no worries": "気にすんな",
        "fr": "マジで", "ngl": "ぶっちゃけ", "tbh": "正直言って", "imo": "個人的には", "imho": "ぶっちゃけ私の意見だと", "afaik": "私の知る限りでは", "idk": "わからん", "idc": "気にしない", "ik": "知ってる", "ikr": "だよね！", "rn": "今すぐ", "asap": "なる早で", "btw": "ところで", "smth": "何か", "bc": "なぜなら", "cuz": "だって", "pls": "お願い", "plz": "たのむ", "prob": "たぶん", "prolly": "おそらく", "kinda": "なんか", "dunno": "知らん", "wanna": "したい", "gonna": "するつもり", "gotta": "しなきゃ"
    };

    // ★ 新レイアウト用の要素追加関数 ★
    // 原文と翻訳文を一つの「グループ(枠)」に入れて表示する
    function appendTranslationGroup(originalText) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'translation-group';

        // 1. 原文の表示（上段）
        const sentDiv = document.createElement('div');
        sentDiv.className = 'message sent';
        sentDiv.textContent = originalText;
        groupDiv.appendChild(sentDiv);

        // 2. 翻訳中...の表示（下段）
        const receivedDiv = document.createElement('div');
        receivedDiv.className = 'message received loading';
        receivedDiv.textContent = '翻訳中...';
        groupDiv.appendChild(receivedDiv);

        messagesContainer.appendChild(groupDiv);
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });

        return receivedDiv; // 後で翻訳結果を入れるために、下段の要素を返す
    }

    async function translateText(text) {
        let processedText = text;
        const slangRegex = new RegExp(`\\b(${Object.keys(slangDictionary).join('|')})\\b`, 'gi');
        processedText = processedText.replace(slangRegex, (match) => {
            return ` ${slangDictionary[match.toLowerCase()]} `;
        });

        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(processedText)}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('通信エラー');
            const data = await response.json();
            
            let translatedText = '';
            if (data && data[0]) {
                data[0].forEach(item => {
                    if (item[0]) translatedText += item[0];
                });
            }
            return translatedText.trim();
        } catch (error) {
            console.error(error);
            return 'エラー: 翻訳できませんでした。';
        }
    }

    async function processTranslation(text) {
        if (!text) return;
        if (text === lastTranslatedText) return;
        
        lastTranslatedText = text;
        
        // 枠を作って原文を表示し、「翻訳中...」の要素を受け取る
        const resultDiv = appendTranslationGroup(text);
        
        // 翻訳を実行
        const translatedText = await translateText(text);
        
        // 「翻訳中...」の要素の中身を、実際の翻訳結果に書き換える
        resultDiv.textContent = translatedText;
        resultDiv.classList.remove('loading');
    }

    async function readClipboardAndTranslate() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.trim() !== '') {
                processTranslation(text.trim());
            }
        } catch (err) {
            console.log("クリップボードの読み取りがブロックされました", err);
        }
    }

    // 画面のどこかをクリック(マウスダウン)した瞬間
    document.addEventListener('mousedown', (e) => {
        if (e.target.tagName.toLowerCase() !== 'input') {
            readClipboardAndTranslate();
        }
    });

    // ウィンドウがアクティブになった瞬間
    window.addEventListener('focus', () => {
        setTimeout(readClipboardAndTranslate, 100);
    });

    // 手動入力での翻訳
    sendBtn.addEventListener('click', () => {
        const text = inputText.value.trim();
        if (text) {
            processTranslation(text);
            inputText.value = '';
        }
    });
    
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });

    inputText.addEventListener('paste', () => {
        setTimeout(() => {
            const text = inputText.value.trim();
            if (text) {
                processTranslation(text);
                inputText.value = '';
            }
        }, 50);
    });

</script>

</body>
</html>
